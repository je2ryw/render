name: "CodeQL"

on:
  push:
    branches: [ master ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ master ]
  schedule:
    - cron: '20 10 * * 1'

permissions:
  contents: read
  security-events: write

env:
  # Keep the sibling checkout aligned with the released crypt dependency in go.mod.
  CRYPT_REF: v0.3.0

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go' ]

    steps:
    - name: Checkout render
      uses: actions/checkout@v6
      with:
        path: render

    - name: Checkout crypt
      uses: actions/checkout@v6
      with:
        repository: je2ryw/crypt
        ref: ${{ env.CRYPT_REF }}
        path: crypt

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'
        cache-dependency-path: render/go.sum

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: manual

    - name: Build
      working-directory: render
      run: go build ./...

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
