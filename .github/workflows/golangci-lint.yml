name: golangci-lint
on:
  push:
    tags:
      - v*
    branches:
      - master
      - main
  pull_request:

env:
  # Keep the sibling checkout aligned with the released crypt dependency in go.mod.
  CRYPT_REF: v0.3.0

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout render
        uses: actions/checkout@v6
        with:
          path: render
      - name: Checkout crypt
        uses: actions/checkout@v6
        with:
          repository: je2ryw/crypt
          ref: ${{ env.CRYPT_REF }}
          path: crypt
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: render/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: render
